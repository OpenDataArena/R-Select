### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: /mnt/petrelfs/gaoxin/kdd26/LlamaFactory/examples/deepspeed/ds_z3_config.json  # ZeRO-3: more memory efficient, use together with --separate_eval

### dataset
dataset: placeholder_dataset
